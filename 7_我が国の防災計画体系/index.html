<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我が国の防災計画体系 — インデックス</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080d1a;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --accent3: #34d399;
      --danger: #f87171;
      --sidebar-w: 300px;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== TOP BAR =====
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,13,26,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .topbar-logo {
      font-size: 1.1rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }
    .topbar-logo span { font-size: 0.7rem; font-weight: 400; color: var(--text-muted); display: block; }
    .topbar-search {
      flex: 1;
      position: relative;
      max-width: 600px;
    }
    #search {
      width: 100%;
      padding: 10px 16px 10px 42px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #search:focus {
      border-color: rgba(56,189,248,0.4);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
    }
    #search::placeholder { color: var(--text-muted); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1rem; pointer-events: none; }
    #result-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    /* hamburger button - hidden on desktop */
    .menu-btn {
      display: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1.3rem;
      padding: 6px 10px;
      cursor: pointer;
      line-height: 1;
      transition: background .2s;
    }
    .menu-btn:hover { background: var(--surface-hover); }

    /* ===== LAYOUT ===== */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    /* overlay for mobile */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      backdrop-filter: blur(2px);
    }
    .sidebar-overlay.open { display: block; }

    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 0;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .sidebar-section { margin-bottom: 8px; }
    .sidebar-header {
      padding: 10px 16px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 700;
    }

    .tree-item {
      display: block;
      padding: 7px 16px 7px 0;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--text-dim);
      transition: color .15s, background .15s;
      position: relative;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tree-item:hover { color: var(--text); background: var(--surface-hover); }
    .tree-item.active { color: var(--accent); background: rgba(56,189,248,0.08); }
    .tree-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }
    .tree-indent { display: inline-block; }
    .tree-bullet { margin-right: 6px; font-size: 0.9rem; }
    .tree-count {
      float: right;
      font-size: 0.68rem;
      background: rgba(255,255,255,0.07);
      padding: 1px 6px;
      border-radius: 10px;
      margin-top: 1px;
      margin-right: 16px;
      color: var(--text-muted);
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* Stats row */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
      text-align: center;
    }
    .stat-num { font-size: 1.6rem; font-weight: 900; color: var(--accent); display: block; }
    .stat-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

    /* Category tabs */
    .section-header {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-header .crumb { font-size: 0.8rem; color: var(--text-muted); font-weight: 400; }
    .section-header .crumb span { color: var(--accent); }

    /* File table */
    .file-table { width: 100%; border-collapse: collapse; }
    .file-table thead th {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .file-row {
      border-radius: 8px;
      transition: background .15s;
    }
    .file-row:hover { background: var(--surface-hover); }
    .file-row td {
      padding: 10px 12px;
      vertical-align: middle;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .file-row td:first-child { padding-left: 16px; }
    .file-icon-cell { width: 28px; font-size: 1rem; }
    .file-name-cell { font-size: 0.85rem; }
    .file-name-cell a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color .15s;
    }
    .file-name-cell a:hover { color: var(--accent); }
    .file-crumb-cell {
      font-size: 0.72rem;
      color: var(--text-muted);
      max-width: 350px;
    }
    .crumb-sep { color: rgba(255,255,255,0.2); margin: 0 4px; }

    /* Group header inside table */
    .group-row td {
      padding: 22px 12px 8px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(129,140,248,0.2);
    }

    /* Empty / no results */
    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 80px 20px;
      font-size: 1rem;
    }
    .empty .icon { font-size: 3rem; margin-bottom: 16px; }

    /* Category section blocks */
    .category-block { margin-bottom: 40px; }
    .category-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent2);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-title .ct-badge {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(129,140,248,0.3);
      color: var(--accent2);
      font-weight: 600;
    }

    /* Highlight for search */
    mark { background: rgba(56,189,248,0.3); color: inherit; border-radius: 2px; padding: 0 2px; }

    /* ===== MOBILE RESPONSIVE ===== */
    @media (max-width: 768px) {
      :root { --sidebar-w: 280px; }

      .menu-btn { display: block; }
      #result-count { display: none; }
      .topbar-logo span { display: none; }
      .topbar { padding: 10px 16px; gap: 12px; }
      .topbar-logo { font-size: 0.9rem; }

      /* Sidebar becomes a drawer */
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        z-index: 300;
        transform: translateX(-100%);
        transition: transform 0.28s cubic-bezier(.4,0,.2,1);
        background: #0d1427;
        border-right: 1px solid var(--border);
        padding-top: 56px;
        box-shadow: 4px 0 30px rgba(0,0,0,0.5);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      /* close button inside drawer */
      .sidebar-close {
        display: flex;
        position: absolute;
        top: 12px; right: 12px;
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.4rem;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
      }
      .sidebar-close:hover { background: var(--surface-hover); color: var(--text); }

      .main { padding: 20px 16px 60px; }

      /* Table → card-style on mobile */
      .file-table thead { display: none; }
      .file-table, .file-table tbody, .file-table tr, .file-table td {
        display: block;
        width: 100%;
      }
      .file-row {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 8px;
        padding: 2px 0;
      }
      .file-row td { border: none; padding: 6px 14px; }
      .file-row td:first-child { padding-top: 10px; }
      .file-row td:last-child { padding-bottom: 10px; }
      .file-icon-cell { display: inline; }
      .file-name-cell { font-size: 0.88rem; }
      .file-crumb-cell { max-width: 100%; }

      .group-row td { padding: 18px 14px 6px; }
      .category-title { font-size: 0.9rem; }
      .stats-bar { gap: 10px; }
      .stat-chip { padding: 8px 14px; }
      .stat-num { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR OVERLAY (mobile) -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- TOP BAR -->
<div class="topbar">
  <button class="menu-btn" id="menu-btn" onclick="openSidebar()" aria-label="メニューを開く">☰</button>
  <div class="topbar-logo">
    🗾 我が国の防災計画体系
    <span>Japan Disaster Plan Hierarchy — Interactive Index</span>
  </div>
  <div class="topbar-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="ファイル名・フォルダ名で検索…" autocomplete="off">
  </div>
  <div id="result-count"></div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="closeSidebar()" aria-label="閉じる">✕</button>
    <div class="sidebar-header">カテゴリ</div>
    <div id="tree-nav"></div>
  </nav>

  <!-- MAIN -->
  <main class="main">
    <div class="stats-bar" id="stats-bar"></div>
    <div id="content"></div>
  </main>
</div>

<script src="data.js"></script>
<script>
// ───────────────────────────────────────────────
// Data helpers
// ───────────────────────────────────────────────
let currentFilter = null; // null = show all, string = top folder name
let searchQuery = '';

// Group files by top-level folder
function groupByTop() {
  const map = {};
  FILES.forEach(f => {
    const top = f.crumb[0] || '(ルート)';
    if (!map[top]) map[top] = [];
    map[top].push(f);
  });
  return map;
}

// Group files by their full crumb path (for sub-grouping)
function groupByCrumb(files) {
  const map = {};
  files.forEach(f => {
    const key = f.crumb.join(' / ') || '(ルート)';
    if (!map[key]) map[key] = [];
    map[key].push(f);
  });
  return map;
}

// ───────────────────────────────────────────────
// Filtering
// ───────────────────────────────────────────────
function getVisible() {
  return FILES.filter(f => {
    // category filter
    if (currentFilter && f.crumb[0] !== currentFilter) return false;
    // search filter
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const inName = f.name.toLowerCase().includes(q);
      const inCrumb = f.crumb.some(c => c.toLowerCase().includes(q));
      return inName || inCrumb;
    }
    return true;
  });
}

// ───────────────────────────────────────────────
// Highlight helper
// ───────────────────────────────────────────────
function hl(text) {
  if (!searchQuery) return escHtml(text);
  const q = escHtml(searchQuery);
  const t = escHtml(text);
  return t.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
    m => `<mark>${m}</mark>`);
}
function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ───────────────────────────────────────────────
// Sidebar
// ───────────────────────────────────────────────
function renderSidebar() {
  const grouped = groupByTop();
  const nav = document.getElementById('tree-nav');
  nav.innerHTML = '';

  // "All" item
  const all = document.createElement('div');
  all.className = 'tree-item' + (currentFilter === null ? ' active' : '');
  all.innerHTML = `<span class="tree-bullet">🗂</span> すべて <span class="tree-count">${FILES.length}</span>`;
  all.onclick = () => { currentFilter = null; render(); };
  nav.appendChild(all);

  const topFolders = ['1_防災基本計画','2_防災業務計画','3_都道府県地域防災計画','4_市区町村地域防災計画'];
  const emoji = {'1_防災基本計画':'🏛','2_防災業務計画':'🏢','3_都道府県地域防災計画':'🏞','4_市区町村地域防災計画':'🏙'};

  topFolders.forEach(folderKey => {
    if (!grouped[folderKey]) return;
    const count = grouped[folderKey].length;

    // Top folder item
    const item = document.createElement('div');
    item.className = 'tree-item' + (currentFilter === folderKey ? ' active' : '');
    item.innerHTML = `<span class="tree-bullet">${emoji[folderKey]||'📁'}</span> ${escHtml(folderKey)} <span class="tree-count">${count}</span>`;
    item.onclick = () => { currentFilter = folderKey; searchQuery = ''; document.getElementById('search').value = ''; render(); };
    nav.appendChild(item);

    // Sub-folders (level 2)
    const subs = {};
    grouped[folderKey].forEach(f => {
      const sub = f.crumb[1];
      if (sub) {
        if (!subs[sub]) subs[sub] = 0;
        subs[sub]++;
      }
    });
    Object.keys(subs).sort().slice(0, 20).forEach(sub => {
      const subItem = document.createElement('div');
      subItem.className = 'tree-item';
      subItem.style.paddingLeft = '28px';
      subItem.innerHTML = `<span class="tree-bullet" style="font-size:.7rem">└</span> ${escHtml(sub)} <span class="tree-count">${subs[sub]}</span>`;
      subItem.onclick = (e) => {
        e.stopPropagation();
        currentFilter = folderKey;
        searchQuery = sub;
        document.getElementById('search').value = sub;
        render();
      };
      nav.appendChild(subItem);
    });
  });
}

// ───────────────────────────────────────────────
// Stats bar
// ───────────────────────────────────────────────
function renderStats(visible) {
  const grouped = groupByTop();
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = `
    <div class="stat-chip"><span class="stat-num">${FILES.length}</span><span class="stat-label">総ファイル数</span></div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--accent3)">${visible.length}</span><span class="stat-label">表示中</span></div>
    <div class="stat-chip"><span class="stat-num" style="color:var(--accent2)">${Object.keys(grouped).length}</span><span class="stat-label">大区分</span></div>
  `;
}

// ───────────────────────────────────────────────
// Main content
// ───────────────────────────────────────────────
function renderContent(visible) {
  const content = document.getElementById('content');

  if (visible.length === 0) {
    content.innerHTML = `<div class="empty"><div class="icon">🔍</div>「${escHtml(searchQuery)}」に一致するファイルは見つかりませんでした。</div>`;
    return;
  }

  // Group by crumb[0] first (top category), then by full crumb
  const byTop = {};
  visible.forEach(f => {
    const top = f.crumb[0] || '(ルート)';
    if (!byTop[top]) byTop[top] = [];
    byTop[top].push(f);
  });

  const topEmoji = {'1_防災基本計画':'🏛','2_防災業務計画':'🏢','3_都道府県地域防災計画':'🏞','4_市区町村地域防災計画':'🏙'};

  let html = '';
  Object.keys(byTop).sort().forEach(top => {
    const files = byTop[top];
    const byCrumb = groupByCrumb(files);
    const em = topEmoji[top] || '📁';

    html += `<div class="category-block">`;
    html += `<div class="category-title">${em} ${hl(top)} <span class="ct-badge">${files.length} 件</span></div>`;
    html += `<table class="file-table">`;
    html += `<thead><tr><th></th><th>ファイル名</th><th>フォルダ</th></tr></thead><tbody>`;

    Object.keys(byCrumb).sort().forEach((crumbKey, ci) => {
      const crumbFiles = byCrumb[crumbKey];
      // Show group header if crumb differs from top-only
      if (crumbKey !== top && crumbKey !== '(ルート)') {
        const subPath = crumbKey.split(' / ').slice(1).map(c => hl(c)).join('<span class="crumb-sep">▸</span>');
        html += `<tr class="group-row"><td colspan="3">📂 ${subPath}</td></tr>`;
      }

      crumbFiles.forEach(f => {
        const crumbDisplay = f.crumb.slice(1).map(c => hl(c)).join('<span class="crumb-sep">▸</span>');
        html += `<tr class="file-row">
          <td class="file-icon-cell">${f.icon}</td>
          <td class="file-name-cell"><a href="./${f.path}" target="_blank">${hl(f.name)}</a></td>
          <td class="file-crumb-cell">${crumbDisplay}</td>
        </tr>`;
      });
    });

    html += `</tbody></table></div>`;
  });

  content.innerHTML = html;
}

// ───────────────────────────────────────────────
// Main render
// ───────────────────────────────────────────────
function render() {
  const visible = getVisible();
  renderSidebar();
  renderStats(visible);
  renderContent(visible);
  document.getElementById('result-count').textContent =
    searchQuery ? `${visible.length} / ${FILES.length} 件` : `${FILES.length} 件`;
}

// ───────────────────────────────────────────────
// Mobile sidebar drawer
// ───────────────────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
// Auto-close sidebar on mobile when a tree item is clicked
document.getElementById('tree-nav').addEventListener('click', () => {
  if (window.innerWidth <= 768) closeSidebar();
});

// ───────────────────────────────────────────────
// Search
// ───────────────────────────────────────────────
let debounceTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    // If searching, clear category filter to search across all
    if (searchQuery) currentFilter = null;
    render();
  }, 180);
});

// Keyboard: Escape closes sidebar
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSidebar();
});

// Initial render
render();
</script>
</body>
</html>
